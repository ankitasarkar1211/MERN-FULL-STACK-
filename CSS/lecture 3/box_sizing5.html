<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form by me</title>
  <style>
     input, text, textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #333;
      border-radius: 5px;
      box-sizing: border-box;
     }
     form {
      font-size: medium;
      font-family: Arial, Helvetica, sans-serif;
     }
    
     input[type=submit] {
      background-color: rgb(79, 18, 6);
      color: white;
      font-size: medium;
      cursor: pointer;
     }
  </style>
</head>
<body>
  <form action="/submit_form.php">
    Name: <input type="text" name="name" value="Jane Doe"><br>
    Email: <input type="email" name="email" value="abc@gmail.com" ><br>
    Feedback: <textarea name="feedback" rows="5" cols="30"></textarea><br>
    <br><br>
    <input type="submit" value="Submit">
  </form>
</body>
</html>
