<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      display: flex;
      background-color: lightgray;
      padding: 10px;
    }
    .box {
      background-color: teal;
      color: white;
      padding: 20px;
      margin: 5px;
      flex: 1;  /*(page width)all box will grow individually ,responsive*/
      text-align: center;
    }
  </style>
  <title>basic flex</title>
</head>
<body>
  <div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>
</body>
</html>
