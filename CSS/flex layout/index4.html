<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      display: flex;
      height: 200px;
      background-color: beige;
      align-items: center; /*center vertically*/
      justify-content: center; /*center horizontally*/
    }
    .box {
      background-color: darkgreen;
      color: white;
      padding: 20px;
      margin: 5px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">Centered Box</div>
  </div>
</body>
</html>
