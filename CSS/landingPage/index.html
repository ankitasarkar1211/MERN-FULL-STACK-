<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nextora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="navbar">
    <div class="logo">Nextora.</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">About Us</a>
      <a href="#">Services</a>
      <a href="#">Projects</a>
      <a href="#">Blog</a>
      <a href="#">Pricing</a>
    </nav>
    <div class="auth-buttons">
      <button class="login">Log in</button>
      <button class="signup">Sign up</button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Empower Your Business with <br> Modern Solutions</h1>
      <p>
        Drive growth, enhance productivity, and achieve more with our innovative
        services tailored for modern enterprises.
      </p>
      <div class="hero-buttons">
        <button class="primary-btn">Get Started</button>
        <button class="secondary-btn">Explore Services</button>
      </div>

      <!-- Partner Logos -->
      <div class="partners">
        <button class="partner-btn">Ovalism</button>
        <button class="partner-btn">Orbital</button>
        <button class="partner-btn">Web flow</button>
      </div>
    </div>

    <!-- Hero Image -->
    <div class="hero-img">
      <div class="badge">Active 2k+ Members</div>
      <img src="https://images.unsplash.com/photo-1593642532973-d31b6557fa68" alt="Woman working on laptop">
    </div>
  </section>
</body>
</html>
