<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-200 p-6">
    <div
      class="max-w-sm mx-auto bg-white rounded-2xl shadow-lg overflow-hidden"
    >
      <img
        src="https://images.unsplash.com/photo-1755357667384-adec9e5cdf84?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Image"
        class="w-full h-25 object-cover"
      />
      <div class="p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Tailwind Card</h2>
        <p class="text-gray-600 mb-4">
          This is a simple card created using Tailwind CSS utility classes.
        </p>
        <button
          class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
        >
          Learn More
        </button>
      </div>
    </div>
  </body>
</html>
