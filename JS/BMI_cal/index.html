<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #acb6e5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        padding: 30px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        animation: fadeIn 1s ease;
      }
      h1 {
        margin-bottom: 20px;
        color: #333;
        font-size: 28px;
      }
      .input-group {
        margin: 15px 0;
        text-align: left;
      }
      label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #f0f0f0;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }
      input:focus {
        background: #e8f0fe;
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
      }
      button {
        width: 100%;
        padding: 14px;
        margin-top: 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(45deg, #ff6a00, #ee0979);
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.3s;
      }
      button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(238, 9, 121, 0.4);
      }
      .result {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        font-size: 20px;
        font-weight: bold;
        color: #fff;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.6s ease;
      }
      .result.show {
        opacity: 1;
        transform: translateY(0);
      }
      /* Different BMI categories */
      .underweight {
        background: #00bcd4;
      }
      .normal {
        background: #4caf50;
      }
      .overweight {
        background: #ffc107;
      }
      .obese {
        background: #f44336;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>BMI Calculator</h1>
      <div class="input-group">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter your weight" />
      </div>
      <div class="input-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="Enter your height" />
      </div>
      <button onclick="calculateBMI()">Calculate BMI</button>
      <div id="result" class="result"></div>
    </div>
    <script>
      function calculateBMI() {
        let weight = document.getElementById("weight").value;
        let height = document.getElementById("height").value;
        let resultDiv = document.getElementById("result");
        if (weight === "" || height === "" || weight <= 0 || height <= 0) {
          resultDiv.innerHTML = "Please enter valid values!";
          resultDiv.className = "result show obese";
          return;
        }
        let heightM = height / 100;
        let bmi = (weight / (heightM * heightM)).toFixed(1);
        let category = "";
        let cssClass = "";
        if (bmi < 18.5) {
          category = "Underweight";
          cssClass = "underweight";
        } else if (bmi < 25) {
          category = "Normal weight";
          cssClass = "normal";
        } else if (bmi < 30) {
          category = "Overweight";
          cssClass = "overweight";
        } else {
          category = "Obese";
          cssClass = "obese";
        }
        resultDiv.innerHTML = `Your BMI is <strong>${bmi}</strong> (${category})`;
        resultDiv.className = `result show ${cssClass}`;
      }
    </script>
  </body>
</html>
