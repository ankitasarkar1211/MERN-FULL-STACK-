<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double of a Number</title>
  <style>
    body{
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: rgb(216, 250, 227);
    }
    .container{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    input{
      padding: 10px;
      border-radius: 5px;
      font-weight: 10px;
      font-size: 20px;
      width: 30em;
      background-color: rgb(198, 248, 234);
    }
    button{
      padding: 10px;
      border-radius: 5px;
      margin-top: 20px;
      font-weight: 10px;
      font-size: 17px;
      background-color: rgb(12, 133, 12);
      color: white;
      border: none;
    }
    button:hover{
      background-color: rgb(9, 98, 9);
      cursor: pointer;
    }
    #resultDiv{
      margin-top: 20px;
      font-size: 20px;
      font-weight: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Enter an array of numbers (seperated by comma)</h1>
    <input type="text" id="userArray" placeholder="e.g. 1,2,3,4,5">
    <button id="doubleBtn">Show doubled numbers</button>
    <div id="resultDiv">Your new numbers are: </div>
  </div>
</body>
<script>
  const doubleBtn=document.getElementById("doubleBtn");
  let resultDiv=document.getElementById("resultDiv");
  

  let newArray=[];

  const doubled=function(userArray) {
    return userArray.split(",").map(num => Number(num)*2);
  };
  doubleBtn.addEventListener("click", () => {
    const userArray=document.getElementById("userArray").value;
    newArray=doubled(userArray);
    resultDiv.innerHTML="Your new numbers are: "+ newArray.join(",");
  });
</script>
</html>
