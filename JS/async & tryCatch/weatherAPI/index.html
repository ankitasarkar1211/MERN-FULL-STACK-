<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather API calling</title>
</head>
<body>
  <h1>Weather API Calling</h1>
  <button onclick="startApp()">Get Weather</button>
  <div id="output"></div>
</body>
<script>
  const output= document.getElementById("output");
  output.innerHTML= "";
  //Task 1: Create a function getUserInput(callback) that simulates reading 
  // user input after 2 seconds (using setTimeout).
  function getUserInput(callback) {
    output.innerHTML = "Loading...";
    setTimeout(() => {
      const city= "Kolkata";
      callback(city);
    },2000);
  }
  //Create a function validateCity(city) that returns a Promise.
  function validateCity(city) {
    return new Promise((resolve, reject) => {
      console.log("Validating city...");
      if(city && city.trim()!="") {
        resolve(city);
      }
      else {
        reject("Invalid city name");
      }
    });
  }
  // Create a function fetchWeather(city) that fetches weather data from
  async function fetchWeather(city) {
    const apiKey= "d843f74c77749be23b0d054951698e7c";
    const url= `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}`;

    try {
      const response= await fetch(url);
      if(!response.ok) {
        throw new Error((`Failed to fetch weather data: ${response.status} ${response.statusText}`));
      }
      const data= await response.json();

      const temperature= (data.main.temp-273.15).toFixed(1);
      const description= data.weather[0].description;

      return {
        temperature,
        description
      };
    }
    catch(error) {
      throw error;
    }
  }
  function startApp() {
    getUserInput((city) => {
      output.innerHTML = "City entered: " + city;
      validateCity(city)
        .then((validCity) => {
          output.innerHTML += "<br>City validated: " + validCity;
          return fetchWeather(validCity);
        })
        .then((weatherData) => {
          output.innerHTML += `<br>Temperature: ${weatherData.temperature} °C`;
          output.innerHTML += `<br>Description: ${weatherData.description}`;
        })
        .catch((error) => {
          console.error(error);
          output.innerHTML += `<br>Error: ${error.message || error}`;
        });
    });
  }
</script>
</html>
