<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<style>
 body {
 font-family: Arial, sans-serif;
 margin: 0;
 padding: 0;
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 background-color: #f0f0f0;
 }
 .container {
 text-align: center;
 }
 input[type="number"] {
 width: 150px;
 padding: 10px;
 margin-bottom: 10px;
 }
 button {
 padding: 10px 20px;
 background-color: #007bff;
 color: white;
 border: none;
 cursor: pointer;
 }
 button:hover {
 background-color: #0056b3;
 }
 .result {
 font-size: 20px;
 margin-top: 20px;
 }
</style>
</head>
<body>
<div class="container">
 <h2>Temperature Converter</h2>
 <label for="celsius">Enter Celsius:</label>
 <input type="number" id="celsius">
 <br>
 <label for="fahrenheit">Enter Fahrenheit:</label>
 <input type="number" id="fahrenheit">
 <br>
 <button onclick="convertToCelsius()">Convert to Celsius</button>
 <button onclick="convertToFahrenheit()">Convert to Fahrenheit</button>
 <div class="result" id="result"></div>
</div>
<script>
 function convertToCelsius() {
 var fahrenheit = parseFloat(document.getElementById("fahrenheit").value);
 var celsius = (fahrenheit - 32) * (5/9);
 document.getElementById("result").innerText = fahrenheit + "°F is " + celsius.toFixed(2) + "°C";
 }
 function convertToFahrenheit() {
 var celsius = parseFloat(document.getElementById("celsius").value);
 var fahrenheit = (celsius * (9/5)) + 32;
 document.getElementById("result").innerText = celsius + "°C is " + fahrenheit.toFixed(2) + "°F";
 }
</script>
</body>
</html>
