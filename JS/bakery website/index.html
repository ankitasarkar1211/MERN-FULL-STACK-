<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweet Delights</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <h1>Sweet Delights</h1>
        </div>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#menu">Menu</a></li>
          <li><a href="#about">About Us</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="nav_logos">
          <div class="search_logo">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-heart"></i>
            <i class="fa-solid fa-cart-shopping"></i>
          </div>
          <div class="menu-toggle">
            <i class="fa-solid fa-bars"></i>
          </div>
        </div>
      </nav>
    </header>

    <section>
      <div class="main">
        <div class="main_heading">
          <h1>Welcome<br />to a world of<br />Sweet Delights</h1>
        </div>

        <div class="main_image">
          <img
            src="https://i.pinimg.com/1200x/08/73/43/087343f5652781237eef1e909152b89c.jpg"
          />
        </div>
      </div>

      <div class="main_para">
        <p>
          Discover the finest collection of desserts, from creamy cheesecakes to
          rich chocolate brownies. Every bite is made with love and the freshest
          ingredients. Treat yourself today!
        </p>
        <div class="main_btn">
          <a href="#">Order Now</a>
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>

    </section>
  </body>
</html>
